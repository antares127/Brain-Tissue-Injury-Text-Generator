  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f5f7fb 0%, #eef4ff 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #1f2a44;
    }

    .container {
      width: min(900px, 92vw);
      margin: 48px auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(31, 42, 68, 0.08);
      padding: 36px 32px;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin: 0 0 28px;
      letter-spacing: 2px;
      color: #12306d;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.8;
      border: 1px solid transparent;
      border-radius: 14px;
      resize: vertical;
      outline: none;
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
      position: relative;
      z-index: 1;
      transition: box-shadow 0.2s, border-color 0.2s;
      box-shadow: inset 0 0 0 1px rgba(115, 144, 255, 0.16);
      background-clip: padding-box;
    }

    textarea::placeholder {
      color: #93a2c1;
    }

    textarea:focus {
      border-color: #6a8dff;
      box-shadow: inset 0 0 0 1px rgba(74, 105, 255, 0.35), 0 0 0 4px rgba(58, 107, 255, 0.12);
    }

    textarea::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      background: linear-gradient(90deg, rgba(58, 107, 255, 0.35), rgba(106, 142, 255, 0.15), rgba(58, 107, 255, 0.35));
      z-index: -1;
      filter: blur(12px);
      opacity: 0;
      transition: opacity 0.2s;
      animation: flowBorder 3.5s linear infinite;
      background-size: 200% 100%;
    }

    textarea:focus::before {
      opacity: 1;
    }

    @keyframes flowBorder {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    .button-row {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
    }

    .output-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    button {
      border: none;
      background: #3a6bff;
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2952d9;
    }

    .output-panel {
      margin-top: 18px;
      min-height: 180px;
      padding: 18px;
      border-radius: 12px;
      background: #f9faff;
      border: 1px dashed #cdd8ff;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 18px;
      line-height: 1.8;
      color: #23345f;
    }
  </style>

    const locales = {
      zh: {
        title: '脑组织损伤文字生成器',
        placeholder: '输入内容',
        refresh: '刷新结果',
        copy: '复制结果',
        outputPlaceholder: '这里会显示生成结果',
        langButton: 'English',
        copied: '已复制',
        copyFailed: '复制失败'
      },
      en: {
        title: 'Brain Tissue Damage Text Generator',
        placeholder: 'Enter text',
        refresh: 'Refresh',
        copy: 'Copy',
        outputPlaceholder: 'Result will appear here',
        langButton: '中文',
        copied: 'Copied',
        copyFailed: 'Copy failed'
      }
    };

    let currentLang = 'zh';

    function updateStaticText() {
      const locale = locales[currentLang];
      title.dataset.raw = locale.title;
      copyBtn.dataset.raw = locale.copy;
      title.textContent = processText(title.dataset.raw);
      copyBtn.textContent = processText(copyBtn.dataset.raw);
      refreshBtn.textContent = locale.refresh;
      input.placeholder = locale.placeholder;
      langBtn.textContent = locale.langButton;
      if (input.value.trim() === '') {
        output.textContent = locale.outputPlaceholder;
      }
    }

    function toggleLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      updateStaticText();
      updateOutput();
    }

    function isChineseChar(char) {
      return /^[\u4E00-\u9FFF]$/.test(char);
    }

    function maybeToTraditional(char) {
      return Math.random() < 0.66 ? (traditionalMap[char] || char) : char;
    }

    function isLatinLetter(char) {
      return /^[A-Za-z]$/.test(char);
    }

    function maybeChangeLetterCase(char) {
      if (Math.random() < 0.66) {
        return Math.random() < 0.5 ? char.toUpperCase() : char.toLowerCase();
      }
      return char;
    }

    function generateSymbol(previousSymbols) {
      const symbol = symbolPool[Math.floor(Math.random() * symbolPool.length)];
      const count = previousSymbols.filter(s => s === symbol).length;
      if (count > 0 && Math.random() < 0.9) {
        let attempts = 0;
        while (attempts < 30) {
          const newSymbol = symbolPool[Math.floor(Math.random() * symbolPool.length)];
          if (!previousSymbols.includes(newSymbol)) {
            return newSymbol;
          }
          attempts++;
        }
      }
      return symbol;
    }

    function processText(text) {
      let result = '';
      const usedSymbols = [];
      for (const rawChar of text) {
        if (isChineseChar(rawChar)) {
          const char = maybeToTraditional(rawChar);
          const symbol = generateSymbol(usedSymbols);
          result += char + symbol;
          usedSymbols.push(symbol);
        } else if (isLatinLetter(rawChar)) {
          const char = maybeChangeLetterCase(rawChar);
          const symbol = generateSymbol(usedSymbols);
          result += char + symbol;
          usedSymbols.push(symbol);
        } else {
          result += rawChar;
        }
      }
      return result;
    }

    const input = document.getElementById('input');
    const output = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const title = document.getElementById('title');

    function applyStaticTextTransform() {
      title.textContent = processText(title.dataset.raw || title.textContent);
      copyBtn.textContent = processText(copyBtn.dataset.raw || copyBtn.textContent);
    }

    function updateOutput() {
      if (input.value.trim() === '') {
        output.textContent = locales[currentLang].outputPlaceholder;
      } else {
        output.textContent = processText(input.value);
      }
    }

    function refreshOutput() {
      updateOutput();
    }

    function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }

      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      return Promise.resolve();
    }

    function copyOutput() {
      const text = output.textContent || '';
      const originalText = copyBtn.textContent;
      copyTextToClipboard(text)
        .then(() => {
          copyBtn.textContent = locales[currentLang].copied || '已复制';
        })
        .catch(() => {
          copyBtn.textContent = locales[currentLang].copyFailed || '复制失败';
        })
        .finally(() => {
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 1500);
        });
    }

    input.addEventListener('input', updateOutput);
    refreshBtn.addEventListener('click', refreshOutput);
    copyBtn.addEventListener('click', copyOutput);
    langBtn.addEventListener('click', toggleLanguage);
